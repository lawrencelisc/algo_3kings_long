# ==========================================
# [STAGE 1] 全局交易約束 (TRADING)
# 這裡對應 connect.py 中的 load_trading_params()
# ==========================================
TRADING:
  working_capital: 1000.0     # 運作本金
  max_leverage: 10.0          # 最大槓桿倍數
  risk_per_trade: 0.01        # 每筆交易風險比例 (1%)
  min_notional: 5.0           # Bybit 最小名義價值 (防止 Order too small)
  scouting_interval: 130      # 海選掃描頻率 (秒)  由 120 恢復 130 （ver. 2026-04-07)
  # ❌ 舊代碼保留
  # pos_check_interval: 14      # 持倉巡邏與 Trail SL 更新頻率 (秒) 由 10 恢復 14（ver. 2026-04-07)
  # 🚀 修正：縮短監控間隔為 4 秒，提高靈敏度
  pos_check_interval: 4

  # 🚀 新增：強制鎖利參數 (Profit Lock) 放入 TRADING 設定中
  profit_lock_threshold: 0.015  # 啟動門檻：當利潤達到 1.5% 時啟動回撤保護
  profit_retrace_limit: 0.4     # 容忍回撤：如果利潤從最高點回落 40%，立即觸發平倉

# ==========================================
# [STAGE 2] 策略核心參數 (STRATEGY) - 妖幣特化版
# 供參謀部計算指標使用
# ==========================================
STRATEGY:
  net_flow_sigma: 2.0         # Lee-Ready 資金流偏離度門檻 🚀 由 1.5 恢復 2.0 高門檻 (防禦散戶雜音，確認莊家真金白銀)
  tp_atr_mult: 2.5            # 止盈 ATR 倍數 🚀 由 1.5 妖幣爆發力強，TP 設 2.5 (大約等於 2.5 倍波動率利潤)
  sl_atr_mult: 1.0            # 初始止損 ATR 倍數
  trail_atr_mult: 1.0         # 追蹤止損 ATR 步進倍數
  btc_dev_threshold: 0.0025   # BTC 偏離 SMA20 啟動門檻 (0.25%)

# ==========================================
# [STAGE 3] 進階風險管理 (RISK_MANAGEMENT)
# 預留給 Claude 提出的優化模組使用
# ==========================================
RISK_MANAGEMENT:
  max_daily_drawdown: 0.05    # 單日最大回撤熔斷 (5%)
  max_holding_hours: 4        # 持倉時間衰減 (小時)，超時動能消散則離場
  min_imbalance_ratio: 0.2    # 訂單簿失衡度門檻 (買盤需比賣盤厚 20%)
  cooldown_period: 3600       # 同一幣種平倉後的冷卻時間 (秒)

# ==========================================
# [STAGE 4] 通訊配置 (TG_BOT)
# 這裡對應 connect.py 中的 load_tg_config()
# ==========================================
TG_BOT:
